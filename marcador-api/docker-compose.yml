services:
  postgres:
    image: postgres:latest
    container_name: marcador-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:5432"
    restart: always

  mailpit:
    image: axllent/mailpit:edge
    container_name: marcador-mailpit
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: ""
    ports:
      - "${MAILSENDER_PORT}:1025"
      - "${MAIL_INTERFACE_PORT}:8025"
    restart: unless-stopped